apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: {{ include "governance.namespace" . }}
  labels:
    {{- include "governance.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.grafana.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.grafana.size }}
