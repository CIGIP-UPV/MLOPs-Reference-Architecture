apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-broker
  namespace: {{ include "edge-tier.namespace" . }}
  labels:
    app: kafka
    {{- include "edge-tier.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        {{- include "edge-tier.labels" . | nindent 8 }}
    spec:
      containers:
        - name: zookeeper
          image: {{ .Values.images.zookeeper | quote }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
          ports:
            - containerPort: 2181
        - name: kafka
          image: {{ .Values.images.kafka | quote }}
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: localhost:2181
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka-svc.{{ include "edge-tier.namespace" . }}.svc.cluster.local:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-storage
          persistentVolumeClaim:
            claimName: kafka-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  namespace: {{ include "edge-tier.namespace" . }}
  labels:
    {{- include "edge-tier.labels" . | nindent 4 }}
spec:
  type: {{ .Values.services.kafka.type }}
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
