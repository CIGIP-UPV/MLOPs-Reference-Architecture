apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ include "fog-tier.namespace" . }}
  labels:
    app: minio
    {{- include "fog-tier.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        {{- include "fog-tier.labels" . | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.images.minio | quote }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.credentials.minioRootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.credentials.minioRootPassword | quote }}
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: minio-storage
              mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio-svc
  namespace: {{ include "fog-tier.namespace" . }}
  labels:
    {{- include "fog-tier.labels" . | nindent 4 }}
spec:
  type: {{ .Values.services.minio.type }}
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
