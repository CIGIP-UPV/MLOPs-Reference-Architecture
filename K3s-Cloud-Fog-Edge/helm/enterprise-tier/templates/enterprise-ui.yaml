apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-ui
  namespace: {{ include "enterprise-tier.namespace" . }}
  labels:
    app: enterprise-ui
    {{- include "enterprise-tier.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-ui
  template:
    metadata:
      labels:
        app: enterprise-ui
        {{- include "enterprise-tier.labels" . | nindent 8 }}
    spec:
      containers:
        - name: enterprise-ui
          image: {{ .Values.images.enterpriseUi | quote }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-ui-svc
  namespace: {{ include "enterprise-tier.namespace" . }}
  labels:
    {{- include "enterprise-tier.labels" . | nindent 4 }}
spec:
  type: {{ .Values.services.ui.type }}
  selector:
    app: enterprise-ui
  ports:
    - port: 80
      targetPort: 80
