apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-inference
  namespace: edge-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-inference
  template:
    metadata:
      labels:
        app: edge-inference
    spec:
      containers:
      - name: edge-inference
        image: ind-mlops-python-service:latest
        command: ["python", "-m", "services.edge_inference"]
        env:
        - name: MQTT_HOST
          value: "mosquitto-svc.edge-tier.svc.cluster.local"
        - name: INDUSTRIAL_SHARED_SECRET
          value: "industrial-mlops-shared-secret"
        - name: DEPLOYMENT_ROOT
          value: "/var/lib/industrial-mlops/edge"
        - name: TIMESCALE_HOST
          value: "timescale-svc.fog-tier.svc.cluster.local"
        - name: TIMESCALE_PORT
          value: "5432"
        - name: TIMESCALE_ADMIN_USER
          value: "admin"
        - name: TIMESCALE_ADMIN_PASSWORD
          value: "password123"
        - name: FACTORY_DB_NAME
          value: "factory_db"
        ports:
        - containerPort: 8010
        volumeMounts:
        - name: edge-state
          mountPath: /var/lib/industrial-mlops/edge
      volumes:
      - name: edge-state
        persistentVolumeClaim:
          claimName: edge-state-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: edge-inference-svc
  namespace: edge-tier
spec:
  selector:
    app: edge-inference
  ports:
    - port: 8010
      targetPort: 8010
