apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: governance
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'cloud-mlflow'
        static_configs:
          - targets: ['mlflow-svc.cloud-tier.svc.cluster.local:5000']
      
      - job_name: 'cloud-airflow'
        static_configs:
          - targets: ['airflow-svc.cloud-tier.svc.cluster.local:8080']

      - job_name: 'edge-nodered'
        static_configs:
          - targets: ['nodered-svc.edge-tier.svc.cluster.local:1880']

      - job_name: 'edge-inference'
        static_configs:
          - targets: ['edge-inference-svc.edge-tier.svc.cluster.local:8010']

      - job_name: 'edge-sync'
        static_configs:
          - targets: ['edge-sync-svc.edge-tier.svc.cluster.local:8012']

      - job_name: 'cnc-simulator'
        static_configs:
          - targets: ['cnc-simulator-svc.edge-tier.svc.cluster.local:8013']

      - job_name: 'fog-bridge'
        static_configs:
          - targets: ['fog-bridge-svc.fog-tier.svc.cluster.local:8011']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: governance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: governance
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: LoadBalancer
